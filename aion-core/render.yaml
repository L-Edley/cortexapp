services:
  - type: web
    name: aion-core
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    healthCheckTimeout: 60
    numInstances: 1
    plan: starter
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONPATH
        value: /app/src
      - key: AION_TENANT_TOKENS
        sync: false
      - key: AION_GLOBAL_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OBSIDIAN_VAULT_PATH
        value: /obsidian
      - key: DATABASE_DIR
        value: /data/tenants
      - key: VECTOR_STORE_PATH
        value: /data/vectors
      - key: SIMILARITY_THRESHOLD
        value: "0.65"
      - key: NIGHT_RESEARCH_MAX_TOPICS
        value: "10"
      - key: NIGHT_RESEARCH_TIME
        value: "03:00"
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: aion-data
      mountPath: /data
      sizeGB: 1
