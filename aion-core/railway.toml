[build]
  builder = "NIXPACKS"

[deploy]
  startCommand = "uvicorn aion.main:app --host 0.0.0.0 --port ${PORT:-8000}"
  healthcheckPath = "/health"
  healthcheckTimeout = 60
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[volumes]
  "/data" = "aion-data"
  "/obsidian" = "aion-obsidian"

[[crons]]
  schedule = "0 3 * * *"
  command = "python -c \"from aion.research.night_research import run_night_research; import asyncio; asyncio.run(run_night_research('cortex'))\""
